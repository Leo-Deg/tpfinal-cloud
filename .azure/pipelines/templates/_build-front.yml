steps:
  - task: NodeTool@0
    displayName: Use Node.js 20.x
    inputs:
      versionSpec: 20.x

  - script: npm ci
    displayName: npm ci
    workingDirectory: mon-app

  - script: npm run build
    displayName: npm run build
    workingDirectory: mon-app
    env:
      VITE_BUILD_ID: $(Build.SourceVersion)

  - task: PublishPipelineArtifact@1
    displayName: Publish front-dist
    inputs:
      targetPath: mon-app/dist
      artifact: front-dist
      publishLocation: pipeline
